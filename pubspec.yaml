name: living_the_dream_texture_tool
description: "A Flutter desktop tool for importing and processing textures."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zstandard: ^1.5.0
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  image: ^4.8.0
  path: ^1.9.1
  file_picker: ^11.0.2
  state_notifier: ^1.0.0
  extended_image: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.13.1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  inno_bundle: ^0.10.1

inno_bundle:
  id: 4f7eeb80-0a89-11f1-8850-155185c17681
  publisher: "abduznik"
  maintainer: "abduznik <https://github.com/abduznik>"
  languages:
    - english
  app:
    name: "LivingTheDream Texture Tool"
    description: "Texture import and processing tool"
    executable_name: "living_the_dream_texture_tool"
    url: "https://github.com/abduznik/LivingTheDreamTextureTool"

flutter:
  uses-material-design: true
  assets:
    - assets/background.jpg
